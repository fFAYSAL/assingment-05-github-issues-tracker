<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>

    <!-- tailwind css connect -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


     <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />



    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="flex flex-col lg:flex-row lg:justify-between px-10 py-5 bg-white shadow-md gap-4">
        <div class="flex items-center gap-2 font-semibold text-6">
            <img src="./assets/github-logo.png" alt="" class="size-9">
            <h2 class="font-bold  text-[24px]">GitHub Issues Tracker</h2>
        </div>
        <div class="relative flex items-center gap-2 ">
            <span class="absolute left-3 text-gray-400">
              <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </span>
    
            <input 
            type="text" 
            id="search-input" 
            placeholder="Search issues..." 
            class="pl-10 pr-4 py-2 border border-gray-200 rounded-md w-64 md:w-80 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 placeholder:text-gray-400">
            
            <button class="bg-[#4A00FF] p-2 rounded-md text-white text-sm cursor-pointer "><i class="fa-solid fa-plus"></i>New Issue</button>
            

        </div>
        

    </nav>


    <!-- main section -->
     <section class="max-w-7xl mx-auto px-4 sm:6 lg:px-0 ">
        <div class=" flex gap-3 bg-[#ffffff] shadow-md mt-15 border border-gray-100 p-6">
            <button id="all-btn" class="px-12 py-2 bg-[#4A00FF] text-white border border-gray-300 rounded-md cursor-pointer">All</button>
            <button id="open-btn" class="px-12 py-2 border border-gray-300 rounded-md cursor-pointer">Open</button>
            <button id="closed-btn" class="px-12 py-2 border border-gray-300 rounded-md cursor-pointer">Closed</button>
        </div>

        <div class="mt-4 bg-white shadow-md border border-gray-100 p-6">
            <div class="flex justify-between ">
                <div class="flex items-center gap-2">
                    <img src="./assets/Aperture.png" alt="" class="size-8 bg-[#4800ff21] rounded-full  ">
                    <div>
                       <h4 id="issue-count" class="text-5 font-semibold">50 Issues</h4>
                       <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-3 items-center ">
                    
                    <div class="flex items-center gap-1">
                        <i class="fa-solid fa-circle-dot text-green-600"></i>
                       <p>Open</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <i class="fa-solid fa-circle-dot text-purple-600"></i>
                        <p>Closed</p>
                        
                    </div>
                    
                </div>
                

            </div>
            


        </div>
        

        <!-- card section -->


        
        


        <div id="card-container" class="card-div my-7 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-5">

        </div>




        

        <!-- issue Modal -->
       <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 p-6">
  
        </div>


        <div id="focused-card" class="hidden fixed inset-0 flex items-center justify-center z-50 pointer-events-none">
       <div class="bg-white rounded-md shadow-lg p-6 max-w-lg w-full pointer-events-auto transition-transform transform scale-100">
       <!-- focused card -->
       <button id="focused-close" class="absolute top-3 right-3 text-gray-500 hover:text-gray-700 text-lg">&times;</button>
        <div id="focused-content"></div>
        </div>
        </div>
    </section>





     <!-- java script connect -->
      <script src="mainpage.js"></script>

</body>
</html>
