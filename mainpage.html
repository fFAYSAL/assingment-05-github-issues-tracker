<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>

    <!-- tailwind css connect -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


     <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />



    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="flex justify-between px-10 py-5 bg-white shadow-md">
        <div class="flex items-center gap-2 font-semibold text-6">
            <img src="./assets/github-logo.png" alt="" class="size-9">
            <h2>GitHub Issues Tracker</h2>
        </div>
        <div class="relative flex items-center gap-2 ">
            <span class="absolute left-3 text-gray-400">
              <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </span>
    
            <input 
            type="text" 
            id="search-input" 
            placeholder="Search issues..." 
            class="pl-10 pr-4 py-2 border border-gray-200 rounded-md w-64 md:w-80 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 placeholder:text-gray-400">
            
            <button class="bg-[#4A00FF] p-2 rounded-md text-white"><i class="fa-solid fa-plus"></i>New Issue</button>
            

        </div>
        

    </nav>


    <!-- main section -->
     <section class="max-w-7xl mx-auto ">
        <div class="flex gap-3 bg-[#ffffff] shadow-md mt-15 border border-gray-100 p-6">
            <button class="px-12 py-2 bg-[#4A00FF] text-white border border-blue-800 rounded-md">All</button>
            <button class="px-12 py-2 bg-[#4A00FF] text-white border border-blue-800 rounded-md">Open</button>
            <button class="px-12 py-2 bg-[#4A00FF] text-white border border-blue-800 rounded-md">Closed</button>
        </div>

        <div class="mt-4 bg-white shadow-md border border-gray-100 p-6">
            <div class="flex justify-between border-b">
                <div class="flex items-center gap-2">
                    <img src="./assets/Aperture.png" alt="" class="size-8 bg-[#4800ff21] rounded-full  ">
                    <div>
                       <h4 class="text-5 font-semibold">50 Issues</h4>
                       <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-3 items-center ">
                    
                    <div class="flex items-center gap-1">
                        <i class="fa-solid fa-circle-dot text-green-600"></i>
                       <p>Open</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <i class="fa-solid fa-circle-dot text-purple-600"></i>
                        <p>Closed</p>
                        
                    </div>
                    
                </div>
                

            </div>
            


        </div>
            <div class="card-div mt-7">
                <div class="border-t-3 rounded-md border-green-500 p-6 shadow-md">
                    <div class="flex justify-between space-y-3">
                        <img src="./assets/Open-Status.png" alt="">
                        <button class="bg-[#FEECEC] px-9 text-[#EF4444] py-1 rounded-2xl">High</button>
                    </div>
                    <div class="space-y-3">
                        <h2 class="text-[#1F2937] font-semibold text-lg">Fix navigation menu on mobile devices</h2>
                        <p class="text-[#64748B]">The navigation menu doesn't collapse properly on mobile devices...</p>
                        <div>
                            <button class="bg-[#FEECEC] text-[#EF4444] px-3 py-1 rounded-xl border-2 border-red-200"><i class="fa-solid fa-bug"></i>  Bug</button>
                            <button class="bg-[#FDE68A] text-[#D97706] px-3 py-1 rounded-xl border-2 border-yellow-300">   <i class="fa-solid fa-life-ring"></i>  help wanted</button>
                        </div>
                    </div>
                    
                </div>
                <div class="p-6 shadow space-y-5">
                    <h4 class="text-[#64748B]">#1 by john_doe</h4>
                    <p class="class= text-[#64748B]">1/15/2024</p>
                </div>
            </div>

     </section>




     

</body>
</html>
